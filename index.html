<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Desafio Sudeste</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="page page-home">
  <main class="panel hero">
    <span class="eyebrow">Desafio de condicional</span>
    <h1>Descobrindo sua UF</h1>
    <p class="lead">
      Clique no botao para identificador a qual UF você pertence a regiao Sudeste.
    </p>

    <button id="detect-button" class="button" type="button">Identificar origem</button>

    <p id="loading" class="status" hidden>Consultando IP e localizacao...</p>

    <section id="content" class="result-content" hidden>
      <h2 id="headline">Resultado da consulta</h2>
      <p id="ip-text" class="info"></p>
      <p id="location-text" class="location"></p>
      <p id="message-text" class="message"></p>
      <p id="extra-info" class="info"></p>

      <button id="tourism-button" class="button button-secondary" type="button" hidden>
        Ver pontos turisticos da regiao
      </button>

      <section id="tourism-section" class="tourism" hidden>
        <h3 id="tourism-title" class="tourism-title"></h3>
        <div id="tourism-grid" class="tourism-grid"></div>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
  
</body>
</html>
