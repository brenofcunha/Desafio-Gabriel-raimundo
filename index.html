<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Me Aperte</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #f0f4f8;
      font-family: Arial, sans-serif;
    }

    button {
      padding: 20px 40px;
      font-size: 1.5rem;
      font-weight: bold;
      color: #ffffff;
      background-color: #3b82f6;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      transition: background-color 0.2s, transform 0.1s;
    }

    button:hover {
      background-color: #2563eb;
    }

    button:active {
      transform: scale(0.97);
    }
  </style>
</head>
<body>
  <button onclick="window.location.href='result.html'">me aperte</button>
</body>
</html>
