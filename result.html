<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Você é de...</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #f0f4f8;
      font-family: Arial, sans-serif;
    }

    .card {
      background-color: #ffffff;
      border-radius: 12px;
      padding: 40px 60px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
      text-align: center;
      max-width: 500px;
      width: 90%;
    }

    h1 {
      font-size: 2rem;
      color: #1e3a5f;
      margin-bottom: 8px;
    }

    .location {
      font-size: 1.8rem;
      font-weight: bold;
      color: #3b82f6;
      margin-top: 12px;
    }

    .info {
      margin-top: 16px;
      font-size: 0.95rem;
      color: #666;
    }

    a {
      display: inline-block;
      margin-top: 28px;
      padding: 10px 24px;
      font-size: 1rem;
      color: #ffffff;
      background-color: #3b82f6;
      border-radius: 8px;
      text-decoration: none;
      transition: background-color 0.2s;
    }

    a:hover {
      background-color: #2563eb;
    }

    #loading {
      font-size: 1.1rem;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="card">
    <p id="loading">Detectando sua localização...</p>
    <div id="content" style="display:none;">
      <h1>Você é de</h1>
      <p class="location" id="location-text"></p>
      <p class="info" id="extra-info"></p>
    </div>
    <a href="index.html">Voltar</a>
  </div>

  <script>
    const seStates = {
      RJ: "Rio de Janeiro",
      SP: "São Paulo",
      MG: "Minas Gerais",
      ES: "Espírito Santo"
    };

    async function detectLocation() {
      try {
        const response = await fetch("https://ipapi.co/json/");
        if (!response.ok) {
          throw new Error(`HTTP error: ${response.status}`);
        }
        const data = await response.json();

        const city = data.city || "desconhecida";
        const regionCode = (data.region_code || "").toUpperCase();
        const regionName = data.region || "desconhecido";
        const country = data.country_name || "";

        let locationText = `${city} / ${regionCode}`;
        let extraInfo = "";

        if (country === "Brazil" || data.country === "BR") {
          if (seStates[regionCode]) {
            extraInfo = `Estado da região Sudeste: ${seStates[regionCode]}`;
          } else {
            extraInfo = `Estado: ${regionName}`;
          }
        } else {
          extraInfo = `País: ${country}`;
        }

        document.getElementById("location-text").textContent = locationText;
        document.getElementById("extra-info").textContent = extraInfo;
      } catch (error) {
        document.getElementById("location-text").textContent = "(não detectado)";
        document.getElementById("extra-info").textContent =
          "Não foi possível detectar sua localização.";
      }

      document.getElementById("loading").style.display = "none";
      document.getElementById("content").style.display = "block";
    }

    detectLocation();
  </script>
</body>
</html>
